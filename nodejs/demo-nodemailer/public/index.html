<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📧 Nodemailer 发送演示</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
    h1 { color: #2563eb; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
    input, textarea { width: 100%; padding: 0.6rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
    button { background: #2563eb; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 1rem; padding: 0.8rem; border-radius: 6px; display: none; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>📧 Nodemailer 邮件发送演示</h1>
  <form id="emailForm">
    <div class="form-group">
      <label for="to">收件人邮箱:</label>
      <input type="email" id="to" required placeholder="recipient@example.com">
    </div>
    <div class="form-group">
      <label for="subject">主题:</label>
      <input type="text" id="subject" required placeholder="测试邮件主题">
    </div>
    <div class="form-group">
      <label for="text">纯文本正文:</label>
      <textarea id="text" rows="3" placeholder="你好，这是一封测试邮件！"></textarea>
    </div>
    <div class="form-group">
      <label for="html">HTML 正文 (可选，优先级高于纯文本):</label>
      <textarea id="html" rows="3" placeholder="<h2>Hello</h2><p>支持 <b>HTML</b> 标签</p>"></textarea>
    </div>
    <button type="submit" id="submitBtn">发送邮件</button>
  </form>
  <div id="status"></div>

  <script>
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = '发送中...';
      status.style.display = 'block';
      status.className = '';
      status.textContent = '⏳ 正在请求服务器...';

      const payload = {
        to: document.getElementById('to').value,
        subject: document.getElementById('subject').value,
        text: document.getElementById('text').value,
        html: document.getElementById('html').value || undefined
      };

      try {
        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          status.className = 'success';
          status.textContent = `✅ 发送成功！Message ID: ${data.messageId}`;
        } else {
          status.className = 'error';
          status.textContent = `❌ 发送失败: ${data.error} ${data.details ? `(${data.details})` : ''}`;
        }
      } catch (err) {
        status.className = 'error';
        status.textContent = '❌ 网络请求异常，请检查服务是否启动';
      } finally {
        btn.disabled = false;
        btn.textContent = '发送邮件';
      }
    });
  </script>
</body>
</html>
